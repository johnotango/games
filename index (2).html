<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>JohnoTango Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Audiowide&family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{
    background:#05010f;
    min-height:100vh;
    font-family:'Nunito',sans-serif;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
    position:relative;
  }

  .bg-grid{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,20,147,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(0,200,255,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(255,215,0,0.15) 0%, transparent 50%),
      #05010f;
  }

  .bg-grid::after{
    content:'';
    position:absolute;
    bottom:0;left:0;right:0;
    height:40vh;
    background-image:
      linear-gradient(rgba(255,20,147,0.35) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,20,147,0.35) 1px, transparent 1px);
    background-size:40px 40px;
    transform:perspective(500px) rotateX(60deg);
    transform-origin:bottom;
    opacity:0.4;
    mask-image:linear-gradient(to top, #000 30%, transparent 100%);
    -webkit-mask-image:linear-gradient(to top, #000 30%, transparent 100%);
  }

  .scanlines{
    position:fixed;inset:0;z-index:50;pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    mix-blend-mode:multiply;
  }

  .vignette{
    position:fixed;inset:0;z-index:49;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  .app{
    position:relative;z-index:10;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px 60px;
  }

  .marquee{
    position:relative;
    text-align:center;
    margin-bottom:12px;
    padding:20px 30px 24px;
  }

  .bulbs{
    position:absolute;inset:0;
    pointer-events:none;
  }
  .bulb{
    position:absolute;
    width:8px;height:8px;
    border-radius:50%;
    background:#fff200;
    box-shadow:
      0 0 6px #fff200,
      0 0 12px #ffd700,
      0 0 18px rgba(255,215,0,0.6);
    animation:blink 1.2s ease-in-out infinite;
  }
  @keyframes blink{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.3;transform:scale(0.7)}
  }

  .title-stack{position:relative;z-index:2}

  .title-small{
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    color:#00f0ff;
    letter-spacing:4px;
    margin-bottom:10px;
    text-shadow:0 0 8px #00f0ff, 0 0 16px rgba(0,240,255,0.5);
  }

  .title-big{
    font-family:'Monoton', cursive;
    font-size:clamp(52px, 15vw, 120px);
    letter-spacing:6px;
    line-height:0.9;
    color:#ff1493;
    text-shadow:
      0 0 8px #ff1493,
      0 0 20px #ff1493,
      0 0 40px #ff1493,
      0 0 80px rgba(255,20,147,0.5),
      4px 4px 0 #ffd700;
    animation:titleGlow 3s ease-in-out infinite;
  }
  @keyframes titleGlow{
    0%,100%{
      text-shadow:
        0 0 8px #ff1493,
        0 0 20px #ff1493,
        0 0 40px #ff1493,
        4px 4px 0 #ffd700;
    }
    50%{
      text-shadow:
        0 0 12px #ff1493,
        0 0 30px #ff1493,
        0 0 60px #ff1493,
        0 0 100px rgba(255,20,147,0.6),
        4px 4px 0 #ffd700;
    }
  }

  .title-sub{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(18px, 4vw, 28px);
    letter-spacing:8px;
    color:#ffd700;
    margin-top:4px;
    text-shadow:0 0 10px rgba(255,215,0,0.6);
  }

  .coin-line{
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    letter-spacing:3px;
    color:#fff;
    margin:24px 0 36px;
    animation:blinkText 1.5s step-end infinite;
    text-align:center;
  }
  @keyframes blinkText{
    0%,50%{opacity:1}
    51%,100%{opacity:0.2}
  }

  .games-label{
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    color:#00f0ff;
    letter-spacing:4px;
    margin-bottom:20px;
    text-shadow:0 0 10px rgba(0,240,255,0.6);
    align-self:center;
    max-width:500px;
    width:100%;
  }

  .games-grid{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:500px;
  }

  .cabinet{
    position:relative;
    display:flex;
    align-items:center;
    gap:18px;
    padding:20px 22px;
    background:linear-gradient(135deg, rgba(255,20,147,0.1), rgba(0,240,255,0.05));
    border:2px solid rgba(255,20,147,0.4);
    border-radius:4px;
    text-decoration:none;
    color:inherit;
    overflow:hidden;
    transition:all 0.2s ease;
    cursor:pointer;
  }

  .cabinet::before{
    content:'';
    position:absolute;
    top:0;left:-100%;
    width:100%;height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition:left 0.6s;
  }

  .cabinet:hover::before{left:100%}
  .cabinet:hover{
    border-color:#ff1493;
    box-shadow:
      0 0 20px rgba(255,20,147,0.5),
      0 0 40px rgba(255,20,147,0.2),
      inset 0 0 20px rgba(255,20,147,0.1);
    transform:translateY(-2px);
  }
  .cabinet:active{transform:translateY(0) scale(0.98)}

  .cab-icon{
    font-size:44px;
    flex-shrink:0;
    filter:drop-shadow(0 0 8px rgba(255,215,0,0.6));
  }

  .cab-info{flex:1;min-width:0}

  .cab-name{
    font-family:'Audiowide', sans-serif;
    font-size:22px;
    letter-spacing:2px;
    color:#ffd700;
    text-shadow:0 0 8px rgba(255,215,0,0.4);
    line-height:1;
    margin-bottom:6px;
  }

  .cab-desc{
    color:rgba(255,255,255,0.6);
    font-size:12px;
    line-height:1.4;
  }

  .cab-play{
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    color:#00f0ff;
    letter-spacing:2px;
    text-shadow:0 0 6px rgba(0,240,255,0.6);
    flex-shrink:0;
  }

  .cabinet.soon{
    background:rgba(255,255,255,0.02);
    border-color:rgba(255,255,255,0.1);
    cursor:not-allowed;
  }
  .cabinet.soon:hover{
    transform:none;
    border-color:rgba(255,255,255,0.15);
    box-shadow:none;
  }
  .cabinet.soon:hover::before{left:-100%}
  .cabinet.soon .cab-icon{filter:grayscale(1) opacity(0.4)}
  .cabinet.soon .cab-name{color:rgba(255,255,255,0.3)}
  .cabinet.soon .cab-desc{color:rgba(255,255,255,0.2)}
  .cabinet.soon .cab-play{color:rgba(255,255,255,0.3)}

  .footer{
    margin-top:48px;
    font-family:'Press Start 2P', monospace;
    font-size:9px;
    letter-spacing:3px;
    color:rgba(255,255,255,0.3);
    text-align:center;
    line-height:1.8;
  }
  .footer .heart{color:#ff1493;animation:beat 1s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="app">

  <div class="marquee">
    <div class="bulbs" id="bulbs"></div>
    <div class="title-stack">
      <div class="title-small">★  WELCOME TO  ★</div>
      <div class="title-big">JohnoTango</div>
      <div class="title-sub">ARCADE</div>
    </div>
  </div>

  <div class="coin-line">▶ PRESS START ◀</div>

  <div class="games-label">// SELECT YOUR GAME</div>

  <div class="games-grid">

    <a class="cabinet" href="phrase-wheel.html">
      <div class="cab-icon">🎡</div>
      <div class="cab-info">
        <div class="cab-name">PHRASE WHEEL</div>
        <div class="cab-desc">Wheel of Fortune style guessing. Make your own phrases!</div>
      </div>
      <div class="cab-play">PLAY ▶</div>
    </a>

    <div class="cabinet soon">
      <div class="cab-icon">🎲</div>
      <div class="cab-info">
        <div class="cab-name">COMING SOON</div>
        <div class="cab-desc">More family games on the way...</div>
      </div>
      <div class="cab-play">SOON</div>
    </div>

  </div>

  <div class="footer">
    BUILT WITH <span class="heart">♥</span> BY JOHNOTANGO<br/>
    <span style="color:rgba(255,255,255,0.2)">EST. 2026</span>
  </div>

</div>

<script>
  const bulbs = document.getElementById('bulbs');
  const count = 24;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bulb';
    const perimeter = i / count;
    let x, y;
    if (perimeter < 0.25) {
      x = perimeter * 4 * 100;
      y = 0;
    } else if (perimeter < 0.5) {
      x = 100;
      y = (perimeter - 0.25) * 4 * 100;
    } else if (perimeter < 0.75) {
      x = 100 - (perimeter - 0.5) * 4 * 100;
      y = 100;
    } else {
      x = 0;
      y = 100 - (perimeter - 0.75) * 4 * 100;
    }
    b.style.left = 'calc(' + x + '% - 4px)';
    b.style.top = 'calc(' + y + '% - 4px)';
    b.style.animationDelay = (i * 0.1) + 's';
    bulbs.appendChild(b);
  }
</script>

</body>
</html>
