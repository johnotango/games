<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Owen Bennett Games</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --gold: #ffd700;
  --orange: #ff6b35;
  --pink: #ff1493;
  --purple: #7b2fff;
  --dark: #07071a;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
}

body {
  background: var(--dark);
  font-family: 'Nunito', sans-serif;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* STAR FIELD */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.stars canvas { width: 100%; height: 100%; }

/* GLOW BLOBS */
.blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 12s ease-in-out infinite alternate; }
.blob1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; animation-delay: 0s; }
.blob2 { width: 300px; height: 300px; background: var(--pink); top: 30%; right: -80px; animation-delay: -4s; }
.blob3 { width: 350px; height: 350px; background: var(--orange); bottom: -80px; left: 20%; animation-delay: -8s; }
@keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

/* LAYOUT */
.page {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 48px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HERO */
.hero { text-align: center; margin-bottom: 48px; }

.logo-ring {
  width: 90px; height: 90px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: conic-gradient(var(--gold), var(--orange), var(--pink), var(--purple), var(--gold));
  display: flex; align-items: center; justify-content: center;
  animation: spin 8s linear infinite;
  position: relative;
}
.logo-ring::before {
  content: ''; position: absolute; inset: 3px;
  border-radius: 50%; background: var(--dark);
}
.logo-inner { position: relative; z-index: 1; font-size: 36px; line-height: 1; }
@keyframes spin { to { transform: rotate(360deg); } }

.site-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 13vw, 74px);
  letter-spacing: 5px;
  line-height: 0.9;
  background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 40%, var(--pink) 70%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(255,215,0,0.35));
  margin-bottom: 12px;
}

.site-tagline {
  color: rgba(255,255,255,0.45);
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.divider {
  display: flex; align-items: center; gap: 12px;
  width: 100%; max-width: 260px; margin: 0 auto;
}
.divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent); }
.divider-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); opacity: 0.6; }

/* SECTION LABEL */
.section-label {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  align-self: flex-start;
  margin: 36px 0 14px;
}

/* GAME CARDS */
.games-list { width: 100%; display: flex; flex-direction: column; gap: 14px; }

.game-card {
  display: flex;
  align-items: center;
  gap: 18px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s, border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,215,0,0.04) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.2s;
}
.game-card:hover::before, .game-card:active::before { opacity: 1; }
.game-card:hover { border-color: rgba(255,215,0,0.25); background: rgba(255,255,255,0.07); }
.game-card:active { transform: scale(0.97); }

.game-icon-wrap {
  width: 58px; height: 58px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,107,53,0.15));
  border: 1px solid rgba(255,215,0,0.2);
}

.game-text { flex: 1; }
.game-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 5px;
}
.game-desc { color: rgba(255,255,255,0.45); font-size: 13px; line-height: 1.5; }
.game-badge {
  display: inline-block;
  margin-top: 7px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 50px;
  padding: 2px 10px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
}
.game-arrow {
  color: rgba(255,215,0,0.4);
  font-size: 22px;
  flex-shrink: 0;
  transition: transform 0.15s, color 0.15s;
}
.game-card:hover .game-arrow { color: var(--gold); transform: translateX(3px); }

/* COMING SOON */
.coming-soon {
  width: 100%;
  background: rgba(255,255,255,0.02);
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 22px 20px;
  display: flex;
  align-items: center;
  gap: 18px;
}
.cs-icon {
  width: 58px; height: 58px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px dashed rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  opacity: 0.5;
}
.cs-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
  margin-bottom: 3px;
}
.cs-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
}

/* FOOTER */
.footer { margin-top: 56px; text-align: center; }
.footer-text {
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
}
.footer-heart { color: var(--pink); }
</style>
</head>
<body>

<div class="blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="stars"><canvas id="starCanvas"></canvas></div>

<div class="page">

  <div class="hero">
    <div class="logo-ring">
      <div class="logo-inner">🎮</div>
    </div>
    <div class="site-name">Owen Bennett</div>
    <div class="site-tagline">Family Game Night · Play Anywhere</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
  </div>

  <div class="section-label">Games</div>

  <div class="games-list">

    <a class="game-card" href="phrase-wheel.html">
      <div class="game-icon-wrap">🎡</div>
      <div class="game-text">
        <div class="game-title">Phrase Wheel</div>
        <div class="game-desc">Wheel of Fortune-style fun. Make up your own secret phrases for the family to guess.</div>
        <div class="game-badge">Ready to Play</div>
      </div>
      <div class="game-arrow">›</div>
    </a>

    <div class="coming-soon">
      <div class="cs-icon">🃏</div>
      <div>
        <div class="cs-title">More Games</div>
        <div class="cs-label">Coming Soon</div>
      </div>
    </div>

  </div>

  <div class="footer">
    <div class="footer-text">Made with <span class="footer-heart">♥</span> for family game night</div>
  </div>

</div>

<script>
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.003,
    phase: Math.random() * Math.PI * 2
  }));
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(drawStars);
</script>
</body>
</html>
